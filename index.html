<!DOCTYPE html>
<html>
<head>
    <title>The Great Reconnect</title>

            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
            padding: 50px;
        }

        h1 {
            color: #333;
        }

        p {
            font-size: 18px;

<body>
